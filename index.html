    function createMaker(makerData = {}) {
      const node = document.getElementById("makerTemplate").content.firstElementChild.cloneNode(true);
      node.querySelector("[data-field='name']").value = makerData.name || "";
      node.querySelector("[data-field='role']").value = makerData.role || "";
      els.makers.appendChild(node);
      refreshMakerControls();
      return node;
    }

    function refreshMakerControls() {
      const makers = [...els.makers.querySelectorAll("[data-maker]")];
      makers.forEach((maker, index) => {
        const upButton = maker.querySelector("[data-move-maker='up']");
        const downButton = maker.querySelector("[data-move-maker='down']");
        const removeButton = maker.querySelector("[data-remove-maker]");
        if (upButton) upButton.hidden = index === 0;
        if (downButton) downButton.hidden = index === makers.length - 1;
        if (removeButton) removeButton.hidden = makers.length <= 1;
      });
    }

    function refreshNumbers() {
      [...els.groups.querySelectorAll("[data-group]")].forEach((group) => {
        [...group.querySelectorAll("[data-row]")].forEach((row, index) => {
          row.querySelector("[data-field='no']").value = index + 1;
        });
      });
      refreshMoveControls();
    }

    function refreshMoveControls() {
      const groups = [...els.groups.querySelectorAll("[data-group]")];
      groups.forEach((group, groupIndex) => {
        const upButton = group.querySelector("[data-move-group='up']");
        const downButton = group.querySelector("[data-move-group='down']");
        const removeGroup = group.querySelector("[data-remove-group]");
        if (upButton) upButton.hidden = groupIndex === 0;
        if (downButton) downButton.hidden = groupIndex === groups.length - 1;
        if (removeGroup) removeGroup.hidden = groups.length <= 1;

        const rows = [...group.querySelectorAll("[data-row]")];
        rows.forEach((row, rowIndex) => {
          const rowUp = row.querySelector("[data-move-row='up']");
          const rowDown = row.querySelector("[data-move-row='down']");
          const rowRemove = row.querySelector("[data-remove-row]");
          if (rowUp) rowUp.hidden = rowIndex === 0;
          if (rowDown) rowDown.hidden = rowIndex === rows.length - 1;
          if (rowRemove) rowRemove.hidden = rows.length <= 1;
        });
      });
    }

    function collectData() {
      const groups = [...els.groups.querySelectorAll("[data-group]")].map((group) => ({
        date: group.querySelector("[data-field='date']").value,
        rows: [...group.querySelectorAll("[data-row]")].map((row) => {
          const activity = readRichCell(row.querySelector("[data-field='activity']"));
          const result = readRichCell(row.querySelector("[data-field='result']"));
          const pic = readRichCell(row.querySelector("[data-field='pic']"));
          return {
            activity: activity.text,
            activityFormats: activity.formats,
            result: result.text,
            resultFormats: result.formats,
            pic: pic.text,
            picFormats: pic.formats
          };
        })
      }));

      const makers = [...els.makers.querySelectorAll("[data-maker]")].map((maker) => ({
        name: normalizeText(maker.querySelector("[data-field='name']").value),
        role: normalizeText(maker.querySelector("[data-field='role']").value)
      }));

      return {
        schema: 1,
        baType: getType(),
        featureName: normalizeText(fields.featureName.value),
        branchName: normalizeText(fields.branchName.value),
        implementationDate: fields.implementationStartDate.value,
        implementationStartDate: fields.implementationStartDate.value,
        implementationEndDate: fields.implementationEndDate.value,
        autoMerge: true,
        groups,
        bureau: fields.bureau.value,
        city: normalizeText(fields.city.value),
        signDate: fields.signDate.value,
        makers,
        approverName: normalizeText(fields.approverName.value),
        approverRole: normalizeText(fields.approverRole.value)
      };
    }

    function applyData(data, options = {}) {
      const fromShared = Boolean(options.fromShared);
      document.querySelector(`input[name='baType'][value='${data.baType || "pilot"}']`).checked = true;
      fields.featureName.value = data.featureName || "";
      fields.branchName.value = data.branchName || "";
      fields.implementationStartDate.value = formatDateInput(data.implementationStartDate || data.implementationDate || "");
      fields.implementationEndDate.value = formatDateInput(data.implementationEndDate || data.implementationDate || "");
      syncImplementationDateDisplay();
      fields.bureau.value = data.bureau || "A";
      fields.city.value = data.city || "Jakarta";
      fields.signDate.value = formatDateInput(data.signDate || "");
      fields.approverName.value = data.approverName || "";
      fields.approverRole.value = data.approverRole || "";

      els.groups.innerHTML = "";
      (data.groups?.length ? data.groups : [{ date: fields.implementationStartDate.value || "", rows: [{}] }])
        .forEach(createGroup);

      els.makers.innerHTML = "";
      (data.makers?.length ? data.makers : [{ name: "", role: "" }]).forEach(createMaker);
      refreshMakerControls();
      refreshNumbers();
      renderPreview();
      autosave();
      if (!fromShared) queueSharedUpdate();
    }

    function validateData(data) {
      const errors = [];
      if (!data.featureName) errors.push("Nama Project wajib diisi.");
      if (!data.branchName) errors.push("Cabang wajib diisi.");
      if (!data.implementationStartDate) errors.push("Tanggal awal implementasi wajib diisi.");
      if (!data.implementationEndDate) errors.push("Tanggal akhir implementasi wajib diisi.");
      if (data.implementationStartDate && !parseDate(data.implementationStartDate)) errors.push("Tanggal awal implementasi harus format DD/MM/YYYY.");
      if (data.implementationEndDate && !parseDate(data.implementationEndDate)) errors.push("Tanggal akhir implementasi harus format DD/MM/YYYY.");
      const implementationStart = parseDate(data.implementationStartDate);
      const implementationEnd = parseDate(data.implementationEndDate);
      if (implementationStart && implementationEnd && implementationStart > implementationEnd) {
        errors.push("Tanggal awal implementasi tidak boleh setelah tanggal akhir.");
      }
      if (!data.bureau) errors.push("Bureau wajib diisi.");
      if (!data.city) errors.push("Kota wajib diisi.");
      if (!data.signDate) errors.push("Tanggal sign-off wajib diisi.");
      if (data.signDate && !parseDate(data.signDate)) errors.push("Tanggal sign-off harus format DD/MM/YYYY.");
      if (!data.groups.length) errors.push("Minimal 1 tanggal aktivitas.");

      const filledRows = data.groups.flatMap((group) => group.rows).filter((row) =>
        row.activity || row.result || row.pic
      );
      if (!filledRows.length) errors.push("Minimal 1 aktivitas wajib diisi.");

      data.groups.forEach((group, groupIndex) => {
        if (!group.date) errors.push(`Tanggal aktivitas #${groupIndex + 1} wajib diisi.`);
        if (group.date && !parseDate(group.date)) errors.push(`Tanggal aktivitas #${groupIndex + 1} harus format DD/MM/YYYY.`);
        group.rows.forEach((row, rowIndex) => {
          const hasAny = row.activity || row.result || row.pic;
          if (hasAny && !row.activity) errors.push(`Aktivitas ${groupIndex + 1}.${rowIndex + 1} wajib diisi.`);
          if (hasAny && !row.result) errors.push(`Hasil/Keterangan ${groupIndex + 1}.${rowIndex + 1} wajib diisi.`);
          if (hasAny && !row.pic) errors.push(`PIC ${groupIndex + 1}.${rowIndex + 1} wajib diisi.`);
        });
      });

      const validMakers = data.makers.filter((maker) => maker.name || maker.role);
      if (!validMakers.length) errors.push("Minimal 1 pembuat wajib diisi.");
      validMakers.forEach((maker, index) => {
        if (!maker.name) errors.push(`Nama pembuat #${index + 1} wajib diisi.`);
        if (!maker.role) errors.push(`Jabatan pembuat #${index + 1} wajib diisi.`);
      });

      if (!data.approverName) errors.push("Nama menyetujui wajib diisi.");
      if (!data.approverRole) errors.push("Jabatan menyetujui wajib diisi.");
      return errors;
    }

    function openDatePicker(input) {
      if (els.datePicker.parentElement !== document.body) document.body.appendChild(els.datePicker);
      els.datePicker.style.position = "fixed";
      els.datePicker.classList.add("is-sticky");
      const isRange = input.matches("[data-date-range]");
      datePickerState.target = input;
      datePickerState.mode = isRange ? "range" : "single";
      datePickerState.rangeStart = parseDate(fields.implementationStartDate.value);
      datePickerState.rangeEnd = parseDate(fields.implementationEndDate.value);
      const base = datePickerState.rangeStart || parseDate(input.value) || new Date();
      datePickerState.viewDate = new Date(base.getFullYear(), base.getMonth(), 1);
      datePickerState.panel = "day";
      renderDatePicker();
      positionDatePicker(input);
      els.datePicker.hidden = false;
    }

    function closeDatePicker() {
      els.datePicker.hidden = true;
      els.datePicker.classList.remove("is-sticky");
      datePickerState.target = null;
    }

    function positionDatePicker(input) {
      const rect = input.getBoundingClientRect();
      const margin = 12;
      const wasHidden = els.datePicker.hidden;

      if (wasHidden) {
        els.datePicker.style.visibility = "hidden";
        els.datePicker.hidden = false;
      }

      const pickerRect = els.datePicker.getBoundingClientRect();
      const pickerWidth = pickerRect.width || 294;
      const pickerHeight = pickerRect.height || 360;
      const left = Math.min(window.innerWidth - pickerWidth - margin, Math.max(margin, rect.left));
      const below = rect.bottom + 8;
      const above = rect.top - pickerHeight - 8;
      const preferredTop = below + pickerHeight > window.innerHeight && above > margin ? above : below;
      const top = Math.min(window.innerHeight - pickerHeight - margin, Math.max(margin, preferredTop));

      els.datePicker.style.left = `${Math.max(margin, left)}px`;
      els.datePicker.style.top = `${Math.max(margin, top)}px`;

      if (wasHidden) {
        els.datePicker.hidden = true;
        els.datePicker.style.visibility = "";
      }
    }

    function renderDatePicker() {
      const view = datePickerState.viewDate;
      const month = view.getMonth();
      const year = view.getFullYear();
      if (datePickerState.panel === "month") {
        renderMonthPicker(year, month);
        return;
      }
      if (datePickerState.panel === "year") {
        renderYearPicker(year);
        return;
      }
      const first = new Date(year, month, 1);
      const start = new Date(year, month, 1 - first.getDay());
      const weekdays = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];
      const days = Array.from({ length: 42 }, (_, index) => {
        const day = new Date(start.getFullYear(), start.getMonth(), start.getDate() + index);
        const selected = datePickerState.mode === "range"
          ? sameDate(day, datePickerState.rangeStart) || sameDate(day, datePickerState.rangeEnd)
          : sameDate(day, parseDate(datePickerState.target?.value));
        const inRange = datePickerState.mode === "range" && datePickerState.rangeStart && datePickerState.rangeEnd
          && compareDates(day, datePickerState.rangeStart) > 0 && compareDates(day, datePickerState.rangeEnd) < 0;
        const classes = [
          "date-picker-day",
          day.getMonth() !== month ? "is-muted" : "",
          selected ? "is-selected" : "",
          inRange ? "is-in-range" : ""
        ].filter(Boolean).join(" ");
        return `<button class="${classes}" type="button" data-date-day="${dateToInput(day)}">${day.getDate()}</button>`;
      }).join("");

      els.datePicker.innerHTML = `
        <div class="date-picker-header">
          <button class="date-picker-nav" type="button" data-date-nav="-1" aria-label="Bulan sebelumnya">&lsaquo;</button>
          <div class="date-picker-title">
            <button type="button" data-date-panel="month">${monthNames[month]}</button>
            <button type="button" data-date-panel="year">${year}</button>
          </div>
          <button class="date-picker-nav" type="button" data-date-nav="1" aria-label="Bulan berikutnya">&rsaquo;</button>
        </div>
        <div class="date-picker-grid">
          ${weekdays.map((day) => `<div class="date-picker-weekday">${day}</div>`).join("")}
          ${days}
        </div>
        <div class="date-picker-footer">
          <button class="btn btn-secondary" type="button" data-date-clear>Clear</button>
          <button class="btn btn-primary" type="button" data-date-today>Today</button>
        </div>`;
    }

    function renderMonthPicker(year, selectedMonth) {
      const monthLabels = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
      ];
      els.datePicker.innerHTML = `
        <div class="date-picker-header">
          <button class="date-picker-nav" type="button" data-date-year-nav="-1" aria-label="Tahun sebelumnya">&lsaquo;</button>
          <div class="date-picker-title">
            <button type="button" data-date-panel="year">${year}</button>
          </div>
          <button class="date-picker-nav" type="button" data-date-year-nav="1" aria-label="Tahun berikutnya">&rsaquo;</button>
        </div>
        <div class="date-picker-grid month-grid">
          ${monthLabels.map((label, index) => {
            const classes = ["date-picker-choice", index === selectedMonth ? "is-selected" : ""].filter(Boolean).join(" ");
            return `<button class="${classes}" type="button" data-date-month="${index}">${label}</button>`;
          }).join("")}
        </div>`;
    }

    function renderYearPicker(year) {
      const startYear = year - 7;
      const years = Array.from({ length: 16 }, (_, index) => startYear + index);
      els.datePicker.innerHTML = `
        <div class="date-picker-header">
          <button class="date-picker-nav" type="button" data-date-year-block="-16" aria-label="Rentang tahun sebelumnya">&lsaquo;</button>
          <div class="date-picker-title">${startYear} - ${startYear + 15}</div>
          <button class="date-picker-nav" type="button" data-date-year-block="16" aria-label="Rentang tahun berikutnya">&rsaquo;</button>
        </div>
        <div class="date-picker-grid year-grid">
          ${years.map((itemYear) => {
            const classes = ["date-picker-choice", itemYear === year ? "is-selected" : ""].filter(Boolean).join(" ");
            return `<button class="${classes}" type="button" data-date-year="${itemYear}">${itemYear}</button>`;
          }).join("")}
        </div>`;
    }

    function handleDatePickerClick(event) {
      const nav = event.target.closest("[data-date-nav]");
      const panel = event.target.closest("[data-date-panel]");
      const yearNav = event.target.closest("[data-date-year-nav]");
      const yearBlock = event.target.closest("[data-date-year-block]");
      const monthChoice = event.target.closest("[data-date-month]");
      const yearChoice = event.target.closest("[data-date-year]");
      const day = event.target.closest("[data-date-day]");
      if (panel) {
        datePickerState.panel = panel.dataset.datePanel;
        renderDatePicker();
        return;
      }
      if (yearNav) {
        datePickerState.viewDate = new Date(
          datePickerState.viewDate.getFullYear() + Number(yearNav.dataset.dateYearNav),
          datePickerState.viewDate.getMonth(),
          1
        );
        renderDatePicker();
        return;
      }
      if (yearBlock) {
        datePickerState.viewDate = new Date(
          datePickerState.viewDate.getFullYear() + Number(yearBlock.dataset.dateYearBlock),
          datePickerState.viewDate.getMonth(),
          1
        );
        renderDatePicker();
        return;
      }
      if (monthChoice) {
        datePickerState.viewDate = new Date(
          datePickerState.viewDate.getFullYear(),
          Number(monthChoice.dataset.dateMonth),
          1
        );
        datePickerState.panel = "day";
        renderDatePicker();
        return;
      }
      if (yearChoice) {
        datePickerState.viewDate = new Date(
          Number(yearChoice.dataset.dateYear),
          datePickerState.viewDate.getMonth(),
          1
        );
        datePickerState.panel = "month";
        renderDatePicker();
        return;
      }
      if (nav) {
        datePickerState.viewDate = new Date(
          datePickerState.viewDate.getFullYear(),
          datePickerState.viewDate.getMonth() + Number(nav.dataset.dateNav),
          1
        );
        renderDatePicker();
        return;
      }
      if (event.target.closest("[data-date-clear]")) {
        if (datePickerState.mode === "range") {
          fields.implementationStartDate.value = "";
          fields.implementationEndDate.value = "";
          setFieldValue(fields.implementationDate, "");
          datePickerState.rangeStart = null;
          datePickerState.rangeEnd = null;
          renderDatePicker();
          return;
        }
        setFieldValue(datePickerState.target, "");
        closeDatePicker();
        return;
      }
      if (event.target.closest("[data-date-today]")) {
        const today = new Date();
        const value = dateToInput(today);
        if (datePickerState.mode === "range") {
          fields.implementationStartDate.value = value;
          fields.implementationEndDate.value = value;
          syncImplementationDateDisplay();
          setFieldValue(fields.implementationDate, fields.implementationDate.value);
        } else {
          setFieldValue(datePickerState.target, value);
        }
        closeDatePicker();
        return;
      }
      if (!day) return;
      const selected = parseDate(day.dataset.dateDay);
      if (datePickerState.mode === "range") {
        if (!datePickerState.rangeStart || datePickerState.rangeEnd || compareDates(selected, datePickerState.rangeStart) < 0) {
          datePickerState.rangeStart = selected;
          datePickerState.rangeEnd = null;
          fields.implementationStartDate.value = dateToInput(selected);
          fields.implementationEndDate.value = "";
          setFieldValue(fields.implementationDate, dateToInput(selected));
          renderDatePicker();
          return;
        }
        datePickerState.rangeEnd = selected;
        fields.implementationEndDate.value = dateToInput(selected);
        syncImplementationDateDisplay();
        setFieldValue(fields.implementationDate, fields.implementationDate.value);
        renderDatePicker();
        closeDatePicker();
        return;
      }
      setFieldValue(datePickerState.target, dateToInput(selected));
      closeDatePicker();
    }

    function openRoleMenu(input) {
      activeRoleInput = input;
      renderRoleMenu();
      positionRoleMenu(input);
      els.roleMenu.hidden = false;
    }

    function closeRoleMenu() {
      els.roleMenu.hidden = true;
      activeRoleInput = null;
    }

    function positionRoleMenu(input) {
      const rect = input.getBoundingClientRect();
      const width = Math.max(240, Math.min(320, rect.width));
      const left = Math.min(window.innerWidth - width - 12, Math.max(12, rect.left));
      const below = rect.bottom + 8;
      const above = rect.top - 250;
      const top = below + 250 > window.innerHeight && above > 12 ? above : below;
      els.roleMenu.style.width = `${width}px`;
      els.roleMenu.style.left = `${left}px`;
      els.roleMenu.style.top = `${Math.max(12, top)}px`;
    }

    function renderRoleMenu() {
      const value = normalizeText(activeRoleInput?.value);
      const query = value.toLocaleLowerCase("id-ID");
      const exactOptionSelected = roleOptions.some((role) => role.toLocaleLowerCase("id-ID") === query);
      const options = exactOptionSelected
        ? roleOptions
        : roleOptions.filter((role) => role.toLocaleLowerCase("id-ID").includes(query));
      els.roleMenu.innerHTML = options.length
        ? options.map((role) => {
          const active = value === role ? " is-active" : "";
          return `<button class="btn role-option${active}" type="button" data-role-value="${escapeHtml(role)}">${escapeHtml(role)}</button>`;
        }).join("")
        : `<div class="role-empty">Ketik jabatan custom, lalu lanjut isi form.</div>`;
    }

    function chooseRole(value) {
      if (!activeRoleInput) return;
      setFieldValue(activeRoleInput, value);
      activeRoleInput.focus();
      closeRoleMenu();
    }

    function saveDraft() {
      const data = collectData();
      const base = [data.featureName, data.branchName].filter(Boolean).join(" ") || "draft-berita-acara";
      const name = sanitizeFilename(`${base} ${timestampForFilename()}`);
      const blob = new Blob([JSON.stringify({ ...data, exportedAt: new Date().toISOString() }, null, 2)], { type: "application/json" });
      downloadBlob(blob, `${name}.json`);
      setMessage("ok", "Draft JSON diekspor.");
      setStatus("Draft JSON diekspor.");
    }

    function loadDraft() {
      els.importDraftInput.click();
    }

    function importDraft(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          applyData(data);
          setMessage("ok", "Draft JSON berhasil diimpor.");
          setStatus("Draft impor aktif.");
        } catch (error) {
          setMessage("error", `Import gagal: ${error.message}`);
        }
      };
      reader.readAsText(file);
    }

    let autosaveTimer = null;
    function autosave() {
      clearTimeout(autosaveTimer);
      const shouldSync = !applyingRemoteData && !suppressSharedUpdate;
      const updatedAt = applyingRemoteData ? Number(sharedState?.get("updatedAt") || Date.now()) : Date.now();
      autosaveTimer = setTimeout(() => {
        persistAutosave(collectData(), updatedAt);
        if (shouldSync) queueSharedUpdate();
      }, 250);
    }

    function maybeLoadAutosave() {
      if (!collaboration.docId) {
        clearAutosave();
        return null;
      }
      try {
        const data = JSON.parse(localStorage.getItem(AUTOSAVE_KEY) || "null");
        if (data) return data;
      } catch {
        return null;
      }
      return null;
    }

    function renderPreview() {
      const data = collectData();
      const hasCore = data.featureName || data.branchName || data.groups.some((g) => g.rows.some((r) => r.activity || r.result || r.pic));
      if (!hasCore) {
        els.preview.innerHTML = `<div class="empty-preview">Isi data untuk melihat preview berita acara.</div>`;
        return;
      }

      els.preview.innerHTML = "";
      const pages = [];

      const createPaper = (withTable = true) => {
        const article = document.createElement("article");
        article.className = "paper";
        article.innerHTML = `
          <div class="doc-header">
            <div>${escapeHtml(buildHeaderLineOne(data))}</div>
            <div>${escapeHtml(buildHeaderLineTwo(data))}</div>
          </div>
          ${withTable ? `
          <table class="doc-table">
            <thead>
              <tr>
                <th style="width:6%;">No.</th>
                <th style="width:42%;">Aktivitas</th>
                <th style="width:38%;">Hasil / Keterangan</th>
                <th style="width:14%;">PIC</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>` : ""}
          <div class="doc-footer"></div>`;
        els.preview.appendChild(article);
        pages.push(article);
        return article;
      };

      const overflows = (page) => page.scrollHeight > page.clientHeight + 2;
      const makeDateRow = (group) => {
        const row = document.createElement("tr");
        row.className = "date-row";
        row.innerHTML = `<td colspan="4">${escapeHtml(formatDayDate(group.date))}</td>`;
        return row;
      };
      const makeActivityRow = (rowData, displayIndex, rows, spans, localIndex = displayIndex) => {
        const row = document.createElement("tr");
        const rowNumber = (rowData.originalIndex ?? displayIndex) + 1;
        const mergedCell = (key, width, align = "left") => {
          const span = spans[key];
          if (span.hidden[localIndex]) return "";
          const rowspan = span.lengths[localIndex] > 1 ? ` rowspan="${span.lengths[localIndex]}"` : "";
          return `<td${rowspan} style="width:${width}; text-align:${align};">${richTextToPreviewHtml(rows[localIndex][key], rows[localIndex][`${key}Formats`], key)}</td>`;
        };
        row.innerHTML = `
          <td style="width:6%; text-align:center;">${rowData.continued ? "" : rowNumber}</td>
          ${mergedCell("activity", "42%")}
          ${mergedCell("result", "38%")}
          ${mergedCell("pic", "14%", "center")}`;
        return row;
      };
      const makePlainActivityRow = (rowData, displayIndex) => {
        const row = document.createElement("tr");
        const rowNumber = (rowData.originalIndex ?? displayIndex) + 1;
        row.innerHTML = `
          <td style="width:6%; text-align:center;">${rowData.continued ? "" : rowNumber}</td>
          <td style="width:42%;">${richTextToPreviewHtml(rowData.activity, rowData.activityFormats, "activity")}</td>
          <td style="width:38%;">${richTextToPreviewHtml(rowData.result, rowData.resultFormats, "result")}</td>
          <td style="width:14%; text-align:center;">${richTextToPreviewHtml(rowData.pic, rowData.picFormats, "pic")}</td>`;
        return row;
      };

      let page = createPaper(true);
      let tbody = page.querySelector("tbody");

      data.groups.forEach((group) => {
        const rows = splitPreviewRows(group.rows.filter((row) => row.activity || row.result || row.pic));
        if (!rows.length) return;

        let rowStart = 0;
        while (rowStart < rows.length) {
          let dateRow = makeDateRow(group);
          tbody.appendChild(dateRow);
          if (overflows(page) && tbody.children.length > 1) {
            dateRow.remove();
            page = createPaper(true);
            tbody = page.querySelector("tbody");
            dateRow = makeDateRow(group);
            tbody.appendChild(dateRow);
          }

          const segmentRows = [];
          while (rowStart + segmentRows.length < rows.length) {
            const displayIndex = rowStart + segmentRows.length;
            const testRow = makePlainActivityRow(rows[displayIndex], displayIndex);
            tbody.appendChild(testRow);
            if (overflows(page) && segmentRows.length === 0 && tbody.children.length > 2) {
              testRow.remove();
              dateRow.remove();
              page = createPaper(true);
              tbody = page.querySelector("tbody");
              dateRow = makeDateRow(group);
              tbody.appendChild(dateRow);
              continue;
            }
            if (overflows(page) && segmentRows.length > 0) {
              testRow.remove();
              break;
            }
            segmentRows.push(rows[displayIndex]);
            if (overflows(page)) break;
          }

          while (dateRow.nextSibling) dateRow.nextSibling.remove();
          const pageSpans = buildPdfSpans(segmentRows);
          segmentRows.forEach((rowData, localIndex) => {
            tbody.appendChild(makeActivityRow(rowData, rowStart + localIndex, segmentRows, pageSpans, localIndex));
          });
          rowStart += segmentRows.length;

          if (rowStart < rows.length) {
            page = createPaper(true);
            tbody = page.querySelector("tbody");
          }
        }
      });

      const makers = data.makers
        .filter((maker) => maker.name || maker.role)
        .map((maker) => `<p>${escapeHtml(formatPersonText(maker))}</p>`)
        .join("");

      const closing = document.createElement("div");
      closing.innerHTML = `
        <p class="doc-body">Demikian Berita Acara ini dibuat, atas perhatian dan kerja sama Bapak/Ibu, kami ucapkan terima kasih.</p>
        <div class="doc-body">
          <div><strong>OPERATION STRATEGY &amp; DEVELOPMENT GROUP (POL)</strong></div>
          <div><strong>Application &amp; User Acceptance Test Bureau ${escapeHtml(data.bureau)}</strong></div>
          <div>${escapeHtml(data.city)}, ${escapeHtml(formatDate(data.signDate))}</div>
        </div>
        <div class="signature">
          <p class="role">Pembuat :</p>
          ${makers || "<p>-</p>"}
          <p class="role">Menyetujui :</p>
          <p>${escapeHtml(formatPersonText({ name: data.approverName, role: data.approverRole }))}</p>
        </div>`;
      page.insertBefore(closing, page.querySelector(".doc-footer"));
      if (overflows(page)) {
        closing.remove();
        page = createPaper(false);
        page.insertBefore(closing, page.querySelector(".doc-footer"));
      }

      pages.forEach((paper, index) => {
        paper.querySelector(".doc-footer").textContent = `Halaman ${index + 1}/${pages.length}`;
      });
    }

    function splitPreviewRows(rows) {
      return rows.flatMap((row, index) => {
        const activity = splitPreviewCell(row.activity, row.activityFormats);
        const result = splitPreviewCell(row.result, row.resultFormats);
        const pic = splitPreviewCell(row.pic, row.picFormats);
        const count = Math.max(activity.length, result.length, pic.length);
        return Array.from({ length: count }, (_, chunkIndex) => ({
          activity: activity[chunkIndex]?.text || "",
          activityFormats: activity[chunkIndex]?.formats || [],
          result: result[chunkIndex]?.text || "",
          resultFormats: result[chunkIndex]?.formats || [],
          pic: pic[chunkIndex]?.text || "",
          picFormats: pic[chunkIndex]?.formats || [],
          continued: chunkIndex > 0,
          originalIndex: index
        }));
      });
    }

    function splitPreviewCell(value, formats = []) {
      const maxChars = 850;
      const text = normalizeText(value);
      const safeFormats = sanitizeRichFormats(formats, text.length);
      if (text.length <= maxChars) return [{ text, formats: safeFormats }];
      const chunks = [];
      let offset = 0;
      let remaining = text;
      while (remaining.length > maxChars) {
        let cut = remaining.lastIndexOf("\n", maxChars);
        if (cut < maxChars * 0.45) cut = remaining.lastIndexOf(" ", maxChars);
        if (cut < maxChars * 0.45) cut = maxChars;
        const chunkText = remaining.slice(0, cut).trim();
        chunks.push({ text: chunkText, formats: sliceRichFormats(safeFormats, offset, offset + chunkText.length) });
        remaining = remaining.slice(cut).trim();
        offset += cut;
      }
      if (remaining) chunks.push({ text: remaining, formats: sliceRichFormats(safeFormats, offset, offset + remaining.length) });
      return chunks.length ? chunks : [{ text: "", formats: [] }];
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\n/g, "<br>");
    }

    function formatPersonText(person) {
      const name = normalizeText(person.name);
      const role = normalizeText(person.role);
      if (name && role) return `${name} \u2013 ${role}`;
      return name || role || "";
    }

    async function generatePdf() {
      const data = collectData();
      const errors = validateData(data);
      setMessage("", "");
      setGenerateMessage("", "");
      if (errors.length) {
        setGenerateMessage("error", errors.join(" "));
        setStatus("Validasi gagal.");
        return;
      }
      const JsPdfCtor = window.jspdf?.jsPDF;
      if (!JsPdfCtor) {
        setGenerateMessage("error", "Library render PDF belum lengkap. Refresh halaman lalu coba lagi.");
        setStatus("PDF belum siap.");
        return;
      }

      els.generateBtn.disabled = true;
      els.generateBtn.textContent = "Membuat PDF...";
      setStatus("Generate PDF berjalan.");
      try {
        renderPreview();
        const filename = sanitizeFilename(`Form Berita Acara ${data.featureName}`) + ".pdf";
        const pdf = new JsPdfCtor({ unit: "pt", format: "a4", orientation: "portrait" });
        const pdfFont = await registerPdfFonts(pdf);
        buildSelectablePdf(pdf, data, pdfFont);
        pdf.save(filename);
        setGenerateMessage("ok", "PDF berhasil dibuat.");
        setStatus("PDF selesai.");
      } catch (error) {
        setGenerateMessage("error", `Generate gagal: ${error.message}`);
        setStatus("Generate gagal.");
      } finally {
        els.generateBtn.disabled = false;
        els.generateBtn.textContent = "Generate PDF";
      }
    }

    async function registerPdfFonts(pdf) {
      try {
        const [regular, bold, italic, boldItalic] = await Promise.all([
          fetchFontAsBase64(pdfFontSources.regular),
          fetchFontAsBase64(pdfFontSources.bold),
          fetchFontAsBase64(pdfFontSources.italic),
          fetchFontAsBase64(pdfFontSources.boldItalic)
        ]);
        pdf.addFileToVFS("Carlito-Regular.ttf", regular);
        pdf.addFileToVFS("Carlito-Bold.ttf", bold);
        pdf.addFileToVFS("Carlito-Italic.ttf", italic);
        pdf.addFileToVFS("Carlito-BoldItalic.ttf", boldItalic);
        pdf.addFont("Carlito-Regular.ttf", "Carlito", "normal");
        pdf.addFont("Carlito-Bold.ttf", "Carlito", "bold");
        pdf.addFont("Carlito-Italic.ttf", "Carlito", "italic");
        pdf.addFont("Carlito-BoldItalic.ttf", "Carlito", "bolditalic");
        return "Carlito";
      } catch {
        return "helvetica";
      }
    }

    async function fetchFontAsBase64(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Font gagal load: ${response.status}`);
      const buffer = await response.arrayBuffer();
      return arrayBufferToBase64(buffer);
    }

    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = "";
      const chunkSize = 0x8000;
      for (let index = 0; index < bytes.length; index += chunkSize) {
        binary += String.fromCharCode(...bytes.subarray(index, index + chunkSize));
      }
      return btoa(binary);
    }

    function buildSelectablePdf(pdf, data, fontFamily = "helvetica") {
      const layout = {
        pageWidth: pdf.internal.pageSize.getWidth(),
        pageHeight: pdf.internal.pageSize.getHeight(),
        fontFamily,
        left: 72,
        right: 43,
        top: 69,
        footerY: pdf.internal.pageSize.getHeight() - 38,
        bottomLimit: pdf.internal.pageSize.getHeight() - 72,
        tableHeaderHeight: 24,
        dateHeight: 24,
        padX: 5,
        padY: 6,
        bodySize: 10.5,
        bodyLine: 13,
        tableHeaderSize: 11
      };
      layout.contentWidth = layout.pageWidth - layout.left - layout.right;
      layout.columns = [
        layout.contentWidth * 0.06,
        layout.contentWidth * 0.42,
        layout.contentWidth * 0.38,
        layout.contentWidth * 0.14
      ];
      setPdfBaseStyle(pdf, layout);
      let y = drawPdfPageHeader(pdf, data, layout);
      y = drawPdfTableHeader(pdf, layout, y);

      data.groups.forEach((group) => {
        const rows = splitPdfRows(pdf, layout, group.rows.filter((row) => row.activity || row.result || row.pic));
        if (!rows.length) return;
        const rowHeights = rows.map((row) => pdfRowHeight(pdf, layout, row));
        const dateText = formatDayDate(group.date);
        let rowStart = 0;

        while (rowStart < rows.length) {
          if (y + layout.dateHeight > layout.bottomLimit) {
            pdf.addPage();
            setPdfBaseStyle(pdf, layout);
            y = drawPdfPageHeader(pdf, data, layout);
            y = drawPdfTableHeader(pdf, layout, y);
          }
          y = drawPdfDateRow(pdf, layout, y, dateText);

          const pageRows = [];
          const pageRowHeights = [];
          while (rowStart + pageRows.length < rows.length) {
            const sourceIndex = rowStart + pageRows.length;
            const nextHeight = rowHeights[sourceIndex];
            if (pageRows.length === 0 && y + nextHeight > layout.bottomLimit && y > layout.top + 57 + layout.tableHeaderHeight + layout.dateHeight) {
              pdf.addPage();
              setPdfBaseStyle(pdf, layout);
              y = drawPdfPageHeader(pdf, data, layout);
              y = drawPdfTableHeader(pdf, layout, y);
              y = drawPdfDateRow(pdf, layout, y, dateText);
              continue;
            }
            if (pageRows.length > 0 && y + sumRange(pageRowHeights, 0, pageRowHeights.length) + nextHeight > layout.bottomLimit) {
              break;
            }
            pageRows.push(rows[sourceIndex]);
            pageRowHeights.push(nextHeight);
            if (y + sumRange(pageRowHeights, 0, pageRowHeights.length) > layout.bottomLimit) break;
          }

          const pageSpans = buildPdfSpans(pageRows);
          pageRows.forEach((row, localIndex) => {
            y = drawPdfActivityRow(pdf, layout, row, localIndex, pageRows, pageRowHeights, pageSpans, y, rowStart + localIndex);
          });
          rowStart += pageRows.length;

          if (rowStart < rows.length) {
            pdf.addPage();
            setPdfBaseStyle(pdf, layout);
            y = drawPdfPageHeader(pdf, data, layout);
            y = drawPdfTableHeader(pdf, layout, y);
          }
        }
      });

      y += 18;
      if (y + 185 > layout.bottomLimit) {
        pdf.addPage();
        setPdfBaseStyle(pdf, layout);
        y = drawPdfPageHeader(pdf, data, layout);
      }
      drawPdfClosing(pdf, data, layout, y);
      drawPdfFooters(pdf, layout);
    }

    function setPdfBaseStyle(pdf, layout) {
      pdf.setFont(layout.fontFamily, "normal");
      pdf.setTextColor(0, 0, 0);
      pdf.setDrawColor(0, 0, 0);
      pdf.setLineWidth(0.8);
    }

    function drawPdfPageHeader(pdf, data, layout) {
      pdf.setFont(layout.fontFamily, "bold");
      pdf.setFontSize(12);
      pdf.text(buildHeaderLineOne(data), layout.pageWidth / 2, layout.top + 12, { align: "center" });
      pdf.text(buildHeaderLineTwo(data), layout.pageWidth / 2, layout.top + 29.5, { align: "center" });
      return layout.top + 57;
    }

    function drawPdfTableHeader(pdf, layout, y) {
      const headers = ["No.", "Aktivitas", "Hasil / Keterangan", "PIC"];
      let x = layout.left;
      pdf.setFont(layout.fontFamily, "bold");
      pdf.setFontSize(layout.tableHeaderSize);
      headers.forEach((header, index) => {
        const width = layout.columns[index];
        pdf.rect(x, y, width, layout.tableHeaderHeight);
        pdf.text(header, x + width / 2, y + 15.5, { align: "center" });
        x += width;
      });
      return y + layout.tableHeaderHeight;
    }

    function drawPdfDateRow(pdf, layout, y, text) {
      pdf.setFont(layout.fontFamily, "bold");
      pdf.setFontSize(layout.bodySize);
      pdf.rect(layout.left, y, layout.contentWidth, layout.dateHeight);
      pdf.text(text, layout.left + layout.padX, y + 15.5);
      return y + layout.dateHeight;
    }

    function pdfRowHeight(pdf, layout, row) {
      pdf.setFont(layout.fontFamily, "normal");
      pdf.setFontSize(layout.bodySize);
      const widths = [layout.columns[1], layout.columns[2], layout.columns[3]];
      const values = [
        { text: row.activity, formats: row.activityFormats },
        { text: row.result, formats: row.resultFormats },
        { text: row.pic, formats: row.picFormats }
      ];
      const lineCounts = values.map((value, index) => splitPdfRichText(pdf, value.text, widths[index] - layout.padX * 2, layout, value.formats).length);
      return Math.max(28, Math.max(...lineCounts) * layout.bodyLine + layout.padY * 2);
    }

    function splitPdfText(pdf, value, width) {
      return String(value || "")
        .split("\n")
        .flatMap((line) => pdf.splitTextToSize(line || " ", Math.max(8, width)));
    }

    function pdfSegmentsForRange(text, start, end, formats = []) {
      const value = String(text || "");
      const safeFormats = sanitizeRichFormats(formats, value.length);
      const segments = [];
      let cursor = start;
      while (cursor < end) {
        const state = safeFormats.reduce((acc, format) => {
          if (cursor >= format.start && cursor < format.end) {
            acc.bold = acc.bold || format.bold;
            acc.italic = acc.italic || format.italic;
            acc.underline = acc.underline || format.underline;
          }
          return acc;
        }, { bold: false, italic: false, underline: false });

        let next = cursor + 1;
        while (next < end) {
          const nextState = safeFormats.reduce((acc, format) => {
            if (next >= format.start && next < format.end) {
              acc.bold = acc.bold || format.bold;
              acc.italic = acc.italic || format.italic;
              acc.underline = acc.underline || format.underline;
            }
            return acc;
          }, { bold: false, italic: false, underline: false });
          if (nextState.bold !== state.bold || nextState.italic !== state.italic || nextState.underline !== state.underline) break;
          next += 1;
        }

        segments.push({ text: value.slice(cursor, next), ...state });
        cursor = next;
      }
      return segments.length ? segments : [{ text: " ", bold: false, italic: false, underline: false }];
    }

    function pdfFontStyle(segment) {
      if (segment.bold && segment.italic) return "bolditalic";
      if (segment.bold) return "bold";
      if (segment.italic) return "italic";
      return "normal";
    }

    function measurePdfSegments(pdf, layout, segments) {
      return segments.reduce((total, segment) => {
        pdf.setFont(layout.fontFamily, pdfFontStyle(segment));
        pdf.setFontSize(layout.bodySize);
        return total + pdf.getTextWidth(segment.text);
      }, 0);
    }

    function splitPdfRichText(pdf, value, width, layoutOverride = null, formats = []) {
      const layout = layoutOverride || { fontFamily: "helvetica", bodySize: 10.5 };
      const rawText = normalizeText(value);
      const rawLines = rawText.split("\n");
      const output = [];
      let listNumber = 1;
      let offset = 0;
      rawLines.forEach((rawLine) => {
        const listItem = rawLine.match(/^\s*(?:(\d+)[.)]|-)\s+(.*)$/);
        if (listItem?.[1]) listNumber = Number(listItem[1]);
        const prefix = listItem ? (listItem[1] ? `${listNumber}. ` : "\u2022 ") : "";
        const contentStart = listItem ? rawLine.indexOf(listItem[2]) : 0;
        const tokens = pdfSegmentsForRange(rawText, offset + contentStart, offset + rawLine.length, formats);
        const prefixSegment = prefix ? [{ text: prefix, bold: false, italic: false, underline: false }] : [];
        let segments = [...prefixSegment];
        let hasText = false;

        tokens.forEach((token) => {
          token.text.split(/(\s+)/).forEach((part) => {
            if (!part) return;
            const next = { ...token, text: part };
            const isSpace = /^\s+$/.test(part);
            if (!hasText && isSpace) return;
            const testSegments = [...segments, next];
            if (hasText && measurePdfSegments(pdf, layout, testSegments) > Math.max(8, width)) {
              output.push(segments);
              segments = [...prefixSegment];
              if (!isSpace) {
                segments.push(next);
                hasText = true;
              }
            } else {
              segments.push(next);
              if (!isSpace) hasText = true;
            }
          });
        });

        if (!segments.length || (!hasText && !prefix)) segments = [{ text: " ", bold: false, italic: false, underline: false }];
        output.push(segments);
        if (listItem) listNumber += 1;
        offset += rawLine.length + 1;
      });
      return output.length ? output : [[{ text: " ", bold: false, italic: false, underline: false }]];
    }

    function buildPdfSpans(rows) {
      return {
        activity: buildPdfSpan(rows, "activity"),
        result: buildPdfSpan(rows, "result"),
        pic: buildPdfSpan(rows, "pic")
      };
    }

    function buildPdfSpan(rows, key) {
      const lengths = Array(rows.length).fill(1);
      const hidden = Array(rows.length).fill(false);
      let index = 0;
      while (index < rows.length) {
        const value = normalizeText(rows[index][key]);
        let end = index + 1;
        while (value && end < rows.length && normalizeText(rows[end][key]) === value) end += 1;
        lengths[index] = end - index;
        for (let i = index + 1; i < end; i += 1) hidden[i] = true;
        index = end;
      }
      return { lengths, hidden };
    }

    function drawPdfActivityRow(pdf, layout, row, index, rows, rowHeights, spans, y, displayIndex = index) {
      const rowHeight = rowHeights[index];
      let x = layout.left;
      pdf.setFont(layout.fontFamily, "normal");
      pdf.setFontSize(layout.bodySize);
      const rowNumber = (row.originalIndex ?? displayIndex) + 1;
      drawPdfCell(pdf, layout, x, y, layout.columns[0], rowHeight, [row.continued ? "" : String(rowNumber)], "center");
      x += layout.columns[0];

      ["activity", "result", "pic"].forEach((key, offset) => {
        const span = spans[key];
        const colIndex = offset + 1;
        const width = layout.columns[colIndex];
        if (!span.hidden[index]) {
          const height = sumRange(rowHeights, index, index + span.lengths[index]);
          drawPdfCell(pdf, layout, x, y, width, height, rows[index][key], key === "pic" ? "center" : "left", rows[index][`${key}Formats`]);
        }
        x += width;
      });
      return y + rowHeight;
    }

    function drawPdfCell(pdf, layout, x, y, width, height, value, align = "left", formats = []) {
      pdf.rect(x, y, width, height);
      const lines = splitPdfRichText(pdf, value, width - layout.padX * 2, layout, formats);
      lines.forEach((segments, index) => {
        const textY = y + layout.padY + layout.bodySize + index * layout.bodyLine;
        let textX = align === "center"
          ? x + width / 2 - measurePdfSegments(pdf, layout, segments) / 2
          : x + layout.padX;
        segments.forEach((segment) => {
          pdf.setFont(layout.fontFamily, pdfFontStyle(segment));
          pdf.setFontSize(layout.bodySize);
          pdf.text(segment.text, textX, textY);
          const segmentWidth = pdf.getTextWidth(segment.text);
          if (segment.underline) {
            pdf.line(textX, textY + 1.4, textX + segmentWidth, textY + 1.4);
          }
          textX += segmentWidth;
        });
      });
    }

    function sumRange(values, start, end) {
      return values.slice(start, end).reduce((total, value) => total + value, 0);
    }

    function splitPdfRows(pdf, layout, rows) {
      const maxLines = Math.max(1, Math.floor((layout.bottomLimit - drawPdfPageHeaderHeight(layout) - layout.tableHeaderHeight - layout.dateHeight - layout.padY * 2) / layout.bodyLine));
      return rows.flatMap((row, index) => {
        const values = ["activity", "result", "pic"].map((key, offset) =>
          splitPdfRichChunks(pdf, layout, row[key], row[`${key}Formats`], layout.columns[offset + 1] - layout.padX * 2, maxLines)
        );
        const chunkCount = Math.max(...values.map((chunks) => chunks.length));
        return Array.from({ length: chunkCount }, (_, chunkIndex) => ({
          activity: values[0][chunkIndex]?.text || "",
          activityFormats: values[0][chunkIndex]?.formats || [],
          result: values[1][chunkIndex]?.text || "",
          resultFormats: values[1][chunkIndex]?.formats || [],
          pic: values[2][chunkIndex]?.text || "",
          picFormats: values[2][chunkIndex]?.formats || [],
          continued: chunkIndex > 0,
          originalIndex: index
        }));
      });
    }

    function splitPdfRichChunks(pdf, layout, value, formats = [], width, maxLines) {
      const raw = normalizeText(value);
      const safeFormats = sanitizeRichFormats(formats, raw.length);
      if (!raw) return [{ text: "", formats: [] }];
      const chunks = [];
      let current = [];
      let currentCount = 0;
      let offset = 0;

      raw.split("\n").forEach((line) => {
        const lineFormats = sliceRichFormats(safeFormats, offset, offset + line.length);
        const lineCount = splitPdfRichText(pdf, line, width, layout, lineFormats).length;
        if (current.length && currentCount + lineCount > maxLines) {
          const text = current.join("\n");
          chunks.push({ text, formats: sliceRichFormats(safeFormats, offset - text.length, offset) });
          current = [];
          currentCount = 0;
        }
        if (lineCount > maxLines) {
          splitPdfText(pdf, line, width).forEach((plainLine) => {
            if (currentCount >= maxLines) {
              chunks.push({ text: current.join("\n"), formats: [] });
              current = [];
              currentCount = 0;
            }
            current.push(plainLine);
            currentCount += 1;
          });
          offset += line.length + 1;
          return;
        }
        current.push(line);
        currentCount += lineCount;
        offset += line.length + 1;
      });

      if (current.length) {
        const text = current.join("\n");
        chunks.push({ text, formats: sliceRichFormats(safeFormats, raw.length - text.length, raw.length) });
      }
      return chunks.length ? chunks : [{ text: "", formats: [] }];
    }

    function drawPdfPageHeaderHeight(layout) {
      return layout.top + 57;
    }

    function drawPdfClosing(pdf, data, layout, y) {

    function drawPdfFooters(pdf, layout) {

    document.addEventListener("click", (event) => {
      if (event.target.closest("#roleMenu")) {
        const option = event.target.closest("[data-role-value]");
        if (option) chooseRole(option.dataset.roleValue);
        return;
      }
      const roleToggle = event.target.closest("[data-role-toggle]");
      if (roleToggle) {
        openRoleMenu(roleToggle.closest(".role-combobox").querySelector("[data-role-input]"));
        return;
      }
      if (event.target.closest("#datePicker")) {
        handleDatePickerClick(event);
        closeRoleMenu();
        return;
      }
      const dateInput = event.target.closest(".date-input");
      if (dateInput) {
        closeRoleMenu();
        openDatePicker(dateInput);
        return;
      }
      if (!event.target.closest("[data-role-input]")) closeRoleMenu();
      closeDatePicker();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !els.roleMenu.hidden) {
        closeRoleMenu();
        return;
      }
      if (event.key === "Escape" && !els.datePicker.hidden) {
        closeDatePicker();
        return;
      }
      if (event.target.matches("[data-role-input]") && (event.key === "ArrowDown" || event.key === "Enter")) {
        event.preventDefault();
        openRoleMenu(event.target);
        return;
      }
      if (event.target.matches("#groups textarea") && (event.ctrlKey || event.metaKey)) {
        const shortcut = event.key.toLowerCase();
        const formatMap = { b: "bold", i: "italic", u: "underline" };
        if (formatMap[shortcut]) {
          event.preventDefault();
          activeActivityTextarea = event.target;
          applyTextareaFormat(event.target, formatMap[shortcut]);
          return;
        }
      }
      if (!event.target.matches(".date-input")) return;
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        openDatePicker(event.target);
      }
    });

    document.addEventListener("focusin", (event) => {
      if (isMaskableField(event.target)) activeMaskTarget = event.target;
    });

    document.addEventListener("input", (event) => {
      if (event.target.matches("input, textarea, select")) {
        setGenerateMessage("", "");
        if (event.target.matches("[data-role-input]")) {
          activeRoleInput = event.target;
          renderRoleMenu();
          positionRoleMenu(event.target);

        if (event.target.matches("#groups textarea")) {
          activeActivityTextarea = event.target;

        if (isMaskableField(event.target)) activeMaskTarget = event.target;

        renderPreview();

      createGroup();
      renderPreview();
      autosave();
    });

    document.getElementById("addMakerBtn").addEventListener("click", () => {
      createMaker();
      renderPreview();
      autosave();
    });

    function isMaskableField(element) {
      return Boolean(element?.matches?.("#groups textarea, #approverName, #makers [data-field='name']"));
    }

    function isNameMaskField(element) {
      return Boolean(element?.matches?.("#groups textarea, #approverName, #makers [data-field='name']"));
    }

    function getMaskerForField(element) {
      return isNameMaskField(element) ? maskName : maskConfidentialText;
    }

    function getTextRange(textarea, tokenOnly = false) {
      const start = textarea.selectionStart ?? textarea.value.length;
      const end = textarea.selectionEnd ?? textarea.value.length;
      if (start !== end) return { start, end, text: textarea.value.slice(start, end) };

      const value = textarea.value;
      const test = tokenOnly && !isNameMaskField(textarea) ? /[A-Za-z0-9]/ : /\S/;
      let from = start;
      let to = end;
      while (from > 0 && test.test(value[from - 1])) from -= 1;
      while (to < value.length && test.test(value[to])) to += 1;
      return { start: from, end: to, text: value.slice(from, to) };
    }

    function replaceTextareaRange(textarea, range, replacement) {
      textarea.setSelectionRange(range.start, range.end);
      textarea.setRangeText(replacement, range.start, range.end, "select");
      textarea.focus();
      textarea.dispatchEvent(new Event("input", { bubbles: true }));
    }

    function applyTextareaFormat(textarea, type) {
      const range = getTextRange(textarea);
      if (!range.text) return;
      const nextFormat = {
        start: range.start,
        end: range.end,
        bold: type === "bold",
        italic: type === "italic",
        underline: type === "underline"
      };
      writeRichFormats(textarea, [...readRichFormats(textarea), nextFormat]);
      textarea.focus();
      textarea.setSelectionRange(range.start, range.end);
      textarea.dispatchEvent(new Event("input", { bubbles: true }));
    }

    function applyMasking() {
      const textarea = isMaskableField(document.activeElement)
        ? document.activeElement
        : activeMaskTarget || activeActivityTextarea;
      if (!textarea) {
        setMessage("error", "Klik field yang ingin dimasking lalu pilih teksnya.");
        return;
      }
      const range = getTextRange(textarea, true);
      if (!range.text) {
        setMessage("error", "Pilih teks confidential atau letakkan cursor pada kata yang ingin dimasking.");
        return;
      }
      replaceTextareaRange(textarea, range, getMaskerForField(textarea)(range.text));
      setMessage("ok", "Teks confidential sudah dimasking.");
    }

    els.makers.addEventListener("click", (event) => {
      const removeMaker = event.target.closest("[data-remove-maker]");
      const moveMaker = event.target.closest("[data-move-maker]");
      if (moveMaker) {
        const maker = moveMaker.closest("[data-maker]");
        if (moveMaker.dataset.moveMaker === "up" && maker.previousElementSibling) {
          maker.parentElement.insertBefore(maker, maker.previousElementSibling);
        }
        if (moveMaker.dataset.moveMaker === "down" && maker.nextElementSibling) {
          maker.parentElement.insertBefore(maker.nextElementSibling, maker);
        }
        refreshMakerControls();
        renderPreview();
        autosave();
        return;
      }
      if (!removeMaker) return;
      if (els.makers.querySelectorAll("[data-maker]").length > 1) {
        removeMaker.closest("[data-maker]").remove();
        refreshMakerControls();
        renderPreview();
        autosave();
      }
    });

    document.getElementById("saveDraftBtn").addEventListener("click", saveDraft);
    document.getElementById("loadDraftBtn").addEventListener("click", loadDraft);
    document.getElementById("generateBtn").addEventListener("click", generatePdf);
    document.getElementById("resetBtn").addEventListener("click", resetForm);
    els.collabToggleBtn.addEventListener("click", () => {
      startCollaboration(collaboration.active);
    });
    els.copyShareLinkBtn.addEventListener("click", async () => {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(window.location.href);
      }
      setMessage("ok", "Share link disalin.");
      setStatus("Share link disalin.");
    });
    els.importDraftInput.addEventListener("change", (event) => importDraft(event.target.files[0]));
    document.getElementById("maskSelectionBtn").addEventListener("click", applyMasking);

    els.groups.addEventListener("focusin", (event) => {
      if (event.target.matches("textarea")) activeActivityTextarea = event.target;
    });

    els.groups.addEventListener("click", (event) => {
      const addRow = event.target.closest("[data-add-row]");
      const removeGroup = event.target.closest("[data-remove-group]");
      const removeRow = event.target.closest("[data-remove-row]");
      const moveGroup = event.target.closest("[data-move-group]");
      const moveRow = event.target.closest("[data-move-row]");
      if (addRow) {
        createActivityRow(addRow.closest("[data-group]"));
      }
      if (moveGroup) {
        const group = moveGroup.closest("[data-group]");
        if (moveGroup.dataset.moveGroup === "up" && group.previousElementSibling) {
          group.parentElement.insertBefore(group, group.previousElementSibling);
        }
        if (moveGroup.dataset.moveGroup === "down" && group.nextElementSibling) {
          group.parentElement.insertBefore(group.nextElementSibling, group);
        }
      }
      if (removeGroup && els.groups.querySelectorAll("[data-group]").length > 1) {
        removeGroup.closest("[data-group]").remove();
      }
      if (moveRow) {
        const row = moveRow.closest("[data-row]");
        if (moveRow.dataset.moveRow === "up" && row.previousElementSibling) {
          row.parentElement.insertBefore(row, row.previousElementSibling);
        }
        if (moveRow.dataset.moveRow === "down" && row.nextElementSibling) {
          row.parentElement.insertBefore(row.nextElementSibling, row);
        }
      }
      if (removeRow) {
        const group = removeRow.closest("[data-group]");
        if (group.querySelectorAll("[data-row]").length > 1) {
          removeRow.closest("[data-row]").remove();
        }
      }
      refreshNumbers();
      renderPreview();
      autosave();
    });

    function enableSplitter() {
      const layout = document.querySelector(".layout");
      if (!layout || !els.splitter) return;
      const drag = (event) => {
        const rect = layout.getBoundingClientRect();
        const raw = ((event.clientX - rect.left) / rect.width) * 100;
        const next = Math.min(68, Math.max(32, raw));
        document.documentElement.style.setProperty("--left-pane", `${next}%`);
      };
      els.splitter.addEventListener("pointerdown", (event) => {
        els.splitter.setPointerCapture(event.pointerId);
        drag(event);
      });
      els.splitter.addEventListener("pointermove", (event) => {
        if (els.splitter.hasPointerCapture(event.pointerId)) drag(event);
      });
    }

    enableSplitter();
    applyData(maybeLoadAutosave() || defaultData());
    setModeStatus("draft");
    setSyncStatus("offline");
    renderPresence();
    setLastSynced("-");
    if (collaboration.docId) startCollaboration(false);
    if (!window.jspdf?.jsPDF) {
      setGenerateMessage("error", "Library PDF belum termuat. Refresh jika tombol generate gagal.");
    }
  </script>
</body>
</html>
